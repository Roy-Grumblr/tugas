<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        // javascript operator perbandingan
        let a = 10;
        let b = 5;
        console.log("a == b:"   +(a == b)); // true jika nilai sama
        console.log("a != b:"  +(a != b)); // true jika nilai tidak sama
        console.log("a > b:"  +(a > b)); // true jika a lebih besar dari b
        console.log("a < b:"  +(a < b)); // true jika a lebih kecil dari b
        console.log("a <= b:" +(a <= b)); // true jika a lebih kecil atau sama dengan b
        console.log("a >= b:" +(a >= b)); // true jika a lebih besar atau sama dengan b
    </script>
    
</body>
</html>
